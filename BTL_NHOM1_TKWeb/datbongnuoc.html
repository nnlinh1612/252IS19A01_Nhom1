<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bước 2: Chọn Bắp Nước</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container mt-4 mb-5 pb-5" style="max-width: 800px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold m-0 text-white">Bước 2: Bắp Nước</h3>
            <button class="btn btn-outline-light btn-sm" style="border-radius: 20px; padding: 5px 15px;"
                onclick="window.history.back()">Quay lại</button>
        </div>

        <div class="khoi-giao-dien">
            <h5 class="fw-bold mb-4 text-white">Danh sách bắp nước</h5>
            <p class="text-secondary small mb-3">Bắp thơm nước ngọt mời bạn xơi nha! (Không bắt buộc)</p>

            <div class="d-flex align-items-center p-3 mb-3"
                style="background: #161616; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px;">
                <div class="me-3"
                    style="width: 70px; height: 70px; background: #222; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 35px;">
                    🍿
                </div>
                <div class="flex-grow-1">
                    <div class="fw-bold text-white mb-1" style="font-size: 16px;">Combo 1 Bắp 1 Nước</div>
                    <div style="color: #93e9be; font-size: 15px; font-weight: bold;">65.000đ</div>
                </div>
                <div class="d-flex align-items-center gap-3">
                    <button class="nut-tang-giam" onclick="thayDoiCombo(1, 'giam')">-</button>
                    <span id="so-luong-combo-1" class="fw-bold text-white fs-5"
                        style="width: 20px; text-align: center;">0</span>
                    <button class="nut-tang-giam" onclick="thayDoiCombo(1, 'tang')">+</button>
                </div>
            </div>

            <div class="d-flex align-items-center p-3"
                style="background: #161616; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px;">
                <div class="me-3"
                    style="width: 70px; height: 70px; background: #222; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 35px;">
                    🥤
                </div>
                <div class="flex-grow-1">
                    <div class="fw-bold text-white mb-1" style="font-size: 16px;">Combo 1 Bắp 2 Nước</div>
                    <div style="color: #93e9be; font-size: 15px; font-weight: bold;">85.000đ</div>
                </div>
                <div class="d-flex align-items-center gap-3">
<button class="nut-tang-giam" onclick="thayDoiCombo(2, 'giam')">-</button>
                    <span id="so-luong-combo-2" class="fw-bold text-white fs-5"
                        style="width: 20px; text-align: center;">0</span>
                    <button class="nut-tang-giam" onclick="thayDoiCombo(2, 'tang')">+</button>
                </div>
            </div>
        </div>

        <div class="khoi-giao-dien khu-vuc-thanh-toan">
            <div class="d-flex justify-content-between mb-2">
                <span class="text-secondary">Tiền vé (Đã chọn):</span>
                <span id="hien-thi-tien-ve" class="fw-bold text-white">0đ</span>
            </div>
            <div class="d-flex justify-content-between mb-3">
                <span class="text-secondary">Tổng cộng:</span>
                <span id="hien-thi-tong-tien" class="fw-bold fs-3" style="color: #93e9be;">0đ</span>
            </div>
            <button class="nut-thanh-toan" onclick="chuyenTrangThanhToan()">Đến bước Thanh toán</button>
        </div>
    </div>

    <script>
        const GIA_COMBO_1 = 65000, GIA_COMBO_2 = 85000;
        let slCombo1 = 0, slCombo2 = 0;

        // Mở balo ảo lấy thông tin đơn hàng ra
        let donHang = JSON.parse(localStorage.getItem("thongTinDonHang"));

        document.addEventListener("DOMContentLoaded", () => {
            // Bảo mật: Nếu không có dữ liệu vé từ Bước 1, đá về trang chủ
            if (!donHang || !donHang.tienVe) {
                alert("Vui lòng chọn vé trước khi mua bắp nước!");
                window.location.href = "Trangchu.html";
                return;
            }

            let tienVe = donHang.tienVe;
            document.getElementById("hien-thi-tien-ve").innerText = tienVe.toLocaleString('vi-VN') + "đ";
            tinhTongTien();
        });

        function thayDoiCombo(loai, hanhDong) {
            if (loai === 1) {
                if (hanhDong === 'tang') slCombo1++;
                if (hanhDong === 'giam' && slCombo1 > 0) slCombo1--;
                document.getElementById("so-luong-combo-1").innerText = slCombo1;
            } else {
                if (hanhDong === 'tang') slCombo2++;
                if (hanhDong === 'giam' && slCombo2 > 0) slCombo2--;
                document.getElementById("so-luong-combo-2").innerText = slCombo2;
            }
            tinhTongTien();
        }

        function tinhTongTien() {
            let tienVe = donHang.tienVe;
            let tienCombo = (slCombo1 * GIA_COMBO_1) + (slCombo2 * GIA_COMBO_2);
            let tong = tienVe + tienCombo;
            document.getElementById("hien-thi-tong-tien").innerText = tong.toLocaleString('vi-VN') + "đ";
        }

        function chuyenTrangThanhToan() {
            // Cập nhật thêm bắp nước vào balo
            donHang.soLuongCombo1 = slCombo1;
            donHang.soLuongCombo2 = slCombo2;
donHang.tongTienCuoiCung = donHang.tienVe + (slCombo1 * GIA_COMBO_1) + (slCombo2 * GIA_COMBO_2);

            localStorage.setItem("thongTinDonHang", JSON.stringify(donHang));
            window.location.href = 'thanhtoan.html';
        }
    </script>
</body>

</html>
