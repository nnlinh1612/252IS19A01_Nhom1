<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../hinhanh/logo.png">
    <title>Bước 3: Thanh Toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/datve.css">

</head>

<body>
    <!-- POPUP CẢNH BÁO CHƯA ĐĂNG NHẬP -->
    <div id="popup-canh-bao" class="popup-lop-phu">
        <div class="popup-khung">
            <p>
                Bạn cần phải đăng nhập tài khoản để tiến hành thanh toán và giữ chỗ.
            </p>

            <button class="nut-thanh-toan nut-popup" onclick="veTrangChuDangNhap()">
                Đồng ý
            </button>
        </div>
    </div>

    <div id="thong-bao-custom">Thông báo</div>

    <main class="trang-thanh-toan" id="giao-dien-thanh-toan">
        <div class="tieu-de-dong">
            <h2>Bước 3: Thanh toán</h2>

            <button class="btn btn-outline-light btn-sm nut-quay-lai" onclick="history.back()">
                Quay lại
            </button>
        </div>

        <section class="khoi-giao-dien">
            <h3 class="tieu-de-khoi">Thông tin vé</h3>

            <p class="dong-thong-tin">
                Phim:
                <strong id="tt-phim"></strong>
            </p>

            <p class="dong-thong-tin">
                Thời gian:
                <strong id="tt-thoigian"></strong>
            </p>

            <p class="dong-thong-tin">
                Ghế:
                <strong id="tt-ghe"></strong>
            </p>

            <p class="dong-thong-tin">
                Combo:
                <strong id="tt-combo"></strong>
            </p>
        </section>

        <section class="khoi-giao-dien">
            <h3 class="tieu-de-khoi">Thông tin liên hệ</h3>

            <input type="text" id="nhap-ten" class="o-nhap input-khoa" readonly>
            <input type="email" id="nhap-email" class="o-nhap input-khoa" readonly>
            <input type="text" id="nhap-sdt" class="o-nhap input-khoa" readonly>
        </section>

        <section class="khoi-giao-dien">
            <h3 class="tieu-de-khoi">Phương thức thanh toán</h3>

            <div class="ds-phuong-thuc">
                <label class="phuong-thuc-item active">
                    <input type="radio" name="phuongThucThanhToan" value="VNPAY" checked
                        onchange="chonPhuongThucThanhToan(this)">
                    <span>VNPay</span>
                </label>

                <label class="phuong-thuc-item">
                    <input type="radio" name="phuongThucThanhToan" value="ZaloPay"
                        onchange="chonPhuongThucThanhToan(this)">
                    <span>ZaloPay</span>
                </label>

                <label class="phuong-thuc-item">
                    <input type="radio" name="phuongThucThanhToan" value="Ngân hàng"
                        onchange="chonPhuongThucThanhToan(this)">
                    <span>Ngân hàng</span>
                </label>
            </div>

            <div class="khung-qr-thanh-toan">
                <p id="ten-phuong-thuc-qr">Quét mã VNPay để thanh toán</p>

                <img id="qr-thanh-toan" alt="QR thanh toán">

                <p class="ghi-chu-qr">
                    Nội dung thanh toán:
                    <strong id="noi-dung-chuyen-khoan"></strong>
                </p>
            </div>
        </section>

        <section class="khoi-giao-dien khu-vuc-thanh-toan">
            <div class="dong-thanh-toan">
                <span>Tổng thanh toán:</span>
                <strong id="tt-tongtien">0đ</strong>
            </div>

            <button id="nut-thanh-toan" class="nut-thanh-toan" onclick="chotDon()">
                Thanh toán ngay
            </button>
        </section>
    </main>

    <script src="../js/script.js"></script>
    <script src="../js/taikhoan.js"></script>
    <script>
        /*
            =========================================================
            1. LẤY DỮ LIỆU ĐƠN HÀNG VÀ TÀI KHOẢN
            =========================================================
        */
        let donHang = JSON.parse(localStorage.getItem("thongTinDonHang")) || {};
        let khachHangDaDangNhap = JSON.parse(sessionStorage.getItem("currentUser"));

        /*
            =========================================================
            2. KHI TRANG VỪA MỞ
            =========================================================
        */
        document.addEventListener("DOMContentLoaded", function () {
            if (!khachHangDaDangNhap) {
                hienPopupChuaDangNhap();
                return;
            }

            if (!donHang.maVe) {
                donHang.maVe = taoMaVe();
                localStorage.setItem("thongTinDonHang", JSON.stringify(donHang));
            }

            hienGiaoDienThanhToan();
            hienThongTinVe();
            hienThongTinKhachHang();
            taoQRThanhToan();
        });

        /*
            =========================================================
            3. THÔNG BÁO NHỎ
            =========================================================
        */
        function hienThongBao(tinNhan) {
            let hopThongBao = document.getElementById("thong-bao-custom");

            hopThongBao.innerHTML = "⚠️ " + tinNhan;
            hopThongBao.classList.add("hien-thi");

            setTimeout(function () {
                hopThongBao.classList.remove("hien-thi");
            }, 3000);
        }

        /*
            =========================================================
            4. POPUP CHƯA ĐĂNG NHẬP
            =========================================================
        */
        function hienPopupChuaDangNhap() {
            document.getElementById("giao-dien-thanh-toan").style.display = "none";
            document.getElementById("popup-canh-bao").style.display = "flex";
        }

        function hienGiaoDienThanhToan() {
            document.getElementById("giao-dien-thanh-toan").style.display = "block";
            document.getElementById("popup-canh-bao").style.display = "none";
        }

        function veTrangChuDangNhap() {
            window.location.href = "Trangchu.html";
        }

        /*
            =========================================================
            5. HIỂN THỊ THÔNG TIN VÉ
            =========================================================
        */
        function hienThongTinVe() {
            document.getElementById("tt-phim").innerText =
                donHang.tenPhim || "Chưa có dữ liệu";

            document.getElementById("tt-thoigian").innerText =
                (donHang.gioChieu || "") + " - " + (donHang.ngayChieu || "");

            if (donHang.gheDaChon && donHang.gheDaChon.length > 0) {
                document.getElementById("tt-ghe").innerText = donHang.gheDaChon.join(", ");
            } else {
                document.getElementById("tt-ghe").innerText = "Chưa chọn";
            }

            document.getElementById("tt-combo").innerText = taoChuCombo();

            let tongTien = donHang.tongTienCuoiCung || donHang.tienVe || 0;

            document.getElementById("tt-tongtien").innerText =
                tongTien.toLocaleString("vi-VN") + "đ";
        }

        function taoChuCombo() {
            let chuCombo = "";

            if (donHang.soLuongCombo1 > 0) {
                chuCombo += donHang.soLuongCombo1 + "x Combo 1 ";
            }

            if (donHang.soLuongCombo2 > 0) {
                chuCombo += donHang.soLuongCombo2 + "x Combo 2 ";
            }

            if (chuCombo === "") {
                return "Không mua";
            }

            return chuCombo;
        }

        /*
            =========================================================
            6. HIỂN THỊ THÔNG TIN KHÁCH HÀNG
            =========================================================
        */
        function hienThongTinKhachHang() {
            document.getElementById("nhap-ten").value =
                khachHangDaDangNhap.name || khachHangDaDangNhap.ten || "";

            document.getElementById("nhap-email").value =
                khachHangDaDangNhap.email || "";

            document.getElementById("nhap-sdt").value =
                khachHangDaDangNhap.phone || khachHangDaDangNhap.sdt || "";
        }

        /*
            =========================================================
            7. CHỐT ĐƠN THANH TOÁN
            =========================================================
        */
        function chotDon() {
            let ten = document.getElementById("nhap-ten").value;

            if (!ten) {
                hienThongBao("Hệ thống không tìm thấy thông tin tài khoản!");
                return;
            }

            let nut = document.getElementById("nut-thanh-toan");

            nut.innerHTML = "⏳ Đang xử lý giao dịch...";
            nut.style.pointerEvents = "none";
            nut.style.opacity = "0.8";

            donHang.tenKhachHang = ten;
            donHang.emailKhachHang = document.getElementById("nhap-email").value;
            donHang.sdtKhachHang = document.getElementById("nhap-sdt").value;
            if (!donHang.maVe) {
                donHang.maVe = taoMaVe();
            }
            donHang.phuongThucThanhToan = phuongThucThanhToan;

            localStorage.setItem("thongTinDonHang", JSON.stringify(donHang));

            setTimeout(function () {
                window.location.href = "xacnhanve.html";
            }, 1500);
        }

        let phuongThucThanhToan = "VNPAY";

        function chonPhuongThucThanhToan(input) {
            phuongThucThanhToan = input.value;

            document.querySelectorAll(".phuong-thuc-item").forEach(function (item) {
                item.classList.remove("active");
            });

            input.closest(".phuong-thuc-item").classList.add("active");

            taoQRThanhToan();
        }

        function taoNoiDungThanhToan() {
            let tongTien = donHang.tongTienCuoiCung || donHang.tienVe || 0;
            let tenPhim = donHang.tenPhim || "Chua co phim";
            let ghe = donHang.gheDaChon && donHang.gheDaChon.length > 0
                ? donHang.gheDaChon.join(", ")
                : "Chua chon ghe";

            return `
                PLANT CINEMA
                Phuong thuc: ${phuongThucThanhToan}
                Phim: ${tenPhim}
                Ghe: ${ghe}
                So tien: ${tongTien.toLocaleString("vi-VN")} VND
                Noi dung: THANH TOAN VE PLANT CINEMA
                `.trim();
        }

        function taoQRThanhToan() {
            const qrImg = document.getElementById("qr-thanh-toan");
            const tenQR = document.getElementById("ten-phuong-thuc-qr");
            const noiDungCK = document.getElementById("noi-dung-chuyen-khoan");

            if (!qrImg || !tenQR || !noiDungCK) return;

            let tongTien = donHang.tongTienCuoiCung || donHang.tienVe || 0;
            let maVe = donHang.maVe || taoMaVe();

            donHang.maVe = maVe;
            localStorage.setItem("thongTinDonHang", JSON.stringify(donHang));

            tenQR.innerText = "Quét mã " + phuongThucThanhToan + " để thanh toán";
            noiDungCK.innerText = maVe;

            const noiDungQR = `
                    PLANT CINEMA
                    Phương thức: ${phuongThucThanhToan}
                    Mã vé: ${maVe}
                    Số tiền: ${tongTien.toLocaleString("vi-VN")}đ
                    Nội dung chuyển khoản: ${maVe}
                    `.trim();

            qrImg.src =
                "https://quickchart.io/qr?size=300&margin=2&text=" +
                encodeURIComponent(noiDungQR);
        }

        function taoMaVe() {
            let soNgauNhien = Math.floor(Math.random() * 100000);
            return "PL-" + soNgauNhien;
        }
    </script>
</body>

</html>
