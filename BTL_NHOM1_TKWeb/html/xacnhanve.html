<style>
    /* MINI GAME HỨNG BẮP */
    .link-hung-bap {
        display: block;
        text-align: center;
        margin: -10px 0 22px;
        color: #93e9be;
        font-weight: 800;
        text-decoration: none;
        animation: bapNhapNhay 1.4s infinite alternate;
    }

    .link-hung-bap:hover {
        color: #b8ffd7;
        text-shadow: 0 0 14px rgba(147, 233, 190, 0.75);
    }

    @keyframes bapNhapNhay {
        from {
            opacity: 0.7;
        }

        to {
            opacity: 1;
        }
    }

    .man-game-hung-bap {
        position: fixed;
        inset: 0;
        background: rgba(5, 5, 5, 0.97);
        z-index: 9999;
        display: none;
        overflow: hidden;
        cursor: none;
    }

    .man-game-hung-bap.ket-thuc {
        cursor: default;
    }

    .game-header-bap {
        position: relative;
        z-index: 5;
        text-align: center;
        margin-top: 45px;
        pointer-events: none;
    }

    .game-header-bap h2 {
        color: #93e9be;
        font-size: 32px;
        margin-bottom: 8px;
    }

    .game-header-bap p {
        color: #d0d0d0;
        margin: 0;
    }

    .game-header-bap strong {
        color: #93e9be;
    }

    .khu-bap-roi {
        position: absolute;
        inset: 0;
        overflow: hidden;
    }

    /* CỤC BẮP RANG BƠ RƠI */
    .bap-roi {
        position: absolute;
        top: -60px;
        z-index: 2;
        pointer-events: none;
        animation-name: bapRoiGame;
        animation-timing-function: linear;
        animation-fill-mode: forwards;
    }

    .bap-roi img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        user-select: none;
        pointer-events: none;
        filter: drop-shadow(0 0 6px rgba(255, 230, 150, 0.35));
    }

    .bap-roi::before,
    .bap-roi::after {
        content: "";
        position: absolute;
        background: #fff3c4;
        border-radius: 50%;
    }

    .bap-roi::before {
        width: 10px;
        height: 9px;
        left: -4px;
        top: 3px;
    }

    .bap-roi::after {
        width: 9px;
        height: 8px;
        right: -3px;
        top: 5px;
    }

    .bap-roi.bap-2 {
        background: #ffd76f;
    }

    .bap-roi.bap-3 {
        background: #fff1b8;
    }

    @keyframes bapRoiGame {
        0% {
            transform: translateX(0) translateY(-80px) rotate(0deg);
            opacity: 0;
        }

        10% {
            opacity: 1;
        }

        35% {
            transform: translateX(-45px) translateY(35vh) rotate(120deg);
        }

        70% {
            transform: translateX(45px) translateY(75vh) rotate(260deg);
        }

        100% {
            transform: translateX(-30px) translateY(115vh) rotate(420deg);
            opacity: 0;
        }
    }

    /* HỘP BẮP THEO CHUỘT */
    .hop-bap-tro-chuot {
        position: fixed;
        left: 0;
        top: 0;
        width: 95px;
        height: 95px;
        z-index: 10;
        pointer-events: none;
        transform: translate(-50%, -50%);
        display: none;
    }

    .hop-bap-tro-chuot img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        filter: drop-shadow(0 0 16px rgba(147, 233, 190, 0.65));
    }

    /* HỘP KẾT QUẢ */
    .ket-qua-hung-bap {
        position: absolute;
        z-index: 20;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) scale(0.92);
        width: 90%;
        max-width: 430px;
        background: #111111;
        border: 1px solid #93e9be;
        border-radius: 22px;
        padding: 34px;
        text-align: center;
        display: none;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
    }

    .ket-qua-hung-bap.hien {
        display: block;
        animation: hienKetQuaBap 0.25s ease forwards;
    }

    @keyframes hienKetQuaBap {
        to {
            transform: translate(-50%, -50%) scale(1);
        }
    }

    .ket-qua-hung-bap h2 {
        color: #93e9be;
        margin-bottom: 14px;
    }

    .ket-qua-hung-bap p {
        color: #d8d8d8;
        line-height: 1.6;
    }

    .ket-qua-hung-bap strong {
        color: #93e9be;
    }

    .ket-qua-hung-bap button {
        margin-top: 18px;
        padding: 12px 34px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(45deg, #6ecfa0, #93e9be);
        color: #050505;
        font-weight: 800;
        cursor: pointer;
        transition: 0.25s;
    }

    .ket-qua-hung-bap button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(147, 233, 190, 0.35);
    }

    .khu-vuc-qr {
        margin: 22px 0;
        text-align: center;
    }

    .khu-vuc-qr p {
        color: #93e9be;
        font-weight: 700;
        margin-bottom: 10px;
    }

    #qr-ve {
        display: block;
        width: 150px;
        height: 150px;
        margin: 0 auto;
        background: white;
        padding: 10px;
        border-radius: 14px;
        box-shadow: 0 0 18px rgba(147, 233, 190, 0.25);
        object-fit: contain;
    }

    .anh-qua-trung {
        display: block;
        width: 150px;
        max-height: 160px;
        object-fit: contain;
        margin: 16px auto 0;
        filter: drop-shadow(0 0 16px rgba(147, 233, 190, 0.35));
    }
</style>

<body>
    <main class="trang-xac-nhan">
        <section class="khoi-giao-dien hop-ve-thanh-cong">
            <h2 class="tieu-de-thanh-cong">ĐẶT VÉ THÀNH CÔNG!</h2>
            <a href="#" id="linkHungBap" class="link-hung-bap" onclick="moGameHungBap(event)">
                🍿 Hứng bắp rang bơ để nhận thưởng ngay
            </a>
            <div class="khung-thong-tin-ve">
                <p class="ma-ve">
                    Mã vé:
                    <strong id="kq-ma"></strong>
                </p>

                <p class="dong-thong-tin">
                    Khách hàng:
                    <strong id="kq-ten"></strong>
                </p>

                <p class="dong-thong-tin">
                    Phim:
                    <strong id="kq-phim"></strong>
                </p>

                <p class="dong-thong-tin">
                    Thời gian:
                    <strong id="kq-thoigian"></strong>
                </p>

                <p class="dong-thong-tin">
                    Ghế:
                    <strong id="kq-ghe"></strong>
                    <span id="kq-loaive"></span>
                </p>

                <p class="dong-thong-tin">
                    Combo:
                    <strong id="kq-combo"></strong>
                </p>

                <div class="khu-vuc-qr">
                    <p>Quét mã QR để kiểm tra vé</p>
                    <img id="qr-ve" alt="QR vé xem phim">
                </div>
                <hr>

                <h3 class="tong-da-thanh-toan">
                    Đã thanh toán:
                    <span id="kq-tong"></span>
                </h3>
            </div>

            <div class="khu-vuc-nut">
                <button id="nut-gui-mail" class="nut-gui-mail" onclick="GuiEmail()">Gửi vé về Email</button>
                <button class="nut-thanh-toan" onclick="veTrangChu()">
                    Về Trang Chủ
                </button>
            </div>
        </section>
    </main>

    <script>
        let emailNhanVe = "";
        let qrVeUrl = "";
        const CHE_DO_TEST_TRUNG_THUONG = true;

        document.addEventListener("DOMContentLoaded", function () {
            let donHang = JSON.parse(localStorage.getItem("thongTinDonHang"));

            if (!donHang) {
                window.location.href = "Trangchu.html";
                return;
            }

            /*
                SỬA TẠI ĐÂY: Thay sessionStorage thành localStorage 
                để đọc đúng tài khoản động vừa đăng nhập
            */
            let userDangDangNhap = JSON.parse(localStorage.getItem("currentUser")) || JSON.parse(localStorage.getItem("user_current"));

            if (userDangDangNhap) {
                // Cập nhật thông tin khách hàng động theo tài khoản đang đăng nhập
                donHang.tenKhachHang = userDangDangNhap.name || "";
                donHang.emailKhachHang = userDangDangNhap.email || "";
                donHang.sdtKhachHang = userDangDangNhap.phone || "";
            }

            /*
                Nếu trang thanh toán chưa tạo mã vé thì tạo ở đây.
            */
            if (!donHang.maVe) {
                donHang.maVe = "PL-" + Math.floor(Math.random() * 100000);
            }

            /*
                Đảm bảo tổng tiền luôn có số.
            */
            if (!donHang.tongTienCuoiCung) {
                donHang.tongTienCuoiCung = donHang.tienVe || 0;
            }

            /*
                Đảm bảo gheDaChon luôn là mảng string
            */
            if (!Array.isArray(donHang.gheDaChon)) {
                donHang.gheDaChon = [];
            }

            localStorage.setItem("thongTinDonHang", JSON.stringify(donHang));

            hienThiThongTinVe(donHang);
            luuVeVaoLichSuTaiKhoan(donHang);
        });

        function hienThiThongTinVe(donHang) {
            document.getElementById("kq-ma").innerText = donHang.maVe || "";
            document.getElementById("kq-ten").innerText = donHang.tenKhachHang || "";
            document.getElementById("kq-phim").innerText = donHang.tenPhim || "";

            document.getElementById("kq-thoigian").innerText =
                (donHang.gioChieu || "") + " - " + (donHang.ngayChieu || "");

            if (donHang.gheDaChon && donHang.gheDaChon.length > 0) {
                document.getElementById("kq-ghe").innerText = donHang.gheDaChon.join(", ");
            } else {
                document.getElementById("kq-ghe").innerText = "Chưa có";
            }

            if (donHang.loaiVe) {
                document.getElementById("kq-loaive").innerText = "(" + donHang.loaiVe + ")";
            } else {
                document.getElementById("kq-loaive").innerText = "";
            }

            document.getElementById("kq-combo").innerText = taoChuCombo(donHang);

            let tongTien = donHang.tongTienCuoiCung || donHang.tienVe || 0;

            document.getElementById("kq-tong").innerText =
                tongTien.toLocaleString("vi-VN") + "đ";

            emailNhanVe = donHang.emailKhachHang || "";
            taoMaQRVe(donHang);
        }


        function taoNoiDungQR(donHang) {
            let tongTien = donHang.tongTienCuoiCung || donHang.tienVe || 0;

            return `
            PLANT CINEMA
            Mã vé: ${donHang.maVe || ""}
            Khách hàng: ${donHang.tenKhachHang || ""}
            Phim: ${donHang.tenPhim || ""}
            Thời gian: ${(donHang.gioChieu || "") + " - " + (donHang.ngayChieu || "")}
            Ghế: ${(donHang.gheDaChon && donHang.gheDaChon.length > 0) ? donHang.gheDaChon.join(", ") : "Chưa có"}
            Loại vé: ${donHang.loaiVe || ""}
            Combo: ${taoChuCombo(donHang)}
            Tổng tiền: ${tongTien.toLocaleString("vi-VN")}đ
            `.trim();
        }

        function taoMaQRVe(donHang) {
            const noiDungQR = taoNoiDungQR(donHang);
            const qrImg = document.getElementById("qr-ve");

            qrVeUrl =
                "https://quickchart.io/qr?size=300&margin=2&text=" +
                encodeURIComponent(noiDungQR);

            qrImg.src = qrVeUrl;
        }

        function taoChuCombo(donHang) {
            let chuCombo = "";

            if (donHang.soLuongCombo1 > 0) {
                chuCombo += donHang.soLuongCombo1 + "x Combo 1 ";
            }

            if (donHang.soLuongCombo2 > 0) {
                chuCombo += donHang.soLuongCombo2 + "x Combo 2";
            }

            if (chuCombo === "") {
                return "Không";
            }

            return chuCombo;
        }

        function luuVeVaoLichSuTaiKhoan(donHang) {
            let dsVeTaiKhoan = JSON.parse(localStorage.getItem("cinema_tickets")) || [];

            let daTonTai = false;

            for (let i = 0; i < dsVeTaiKhoan.length; i++) {
                if (dsVeTaiKhoan[i].id === donHang.maVe) {
                    daTonTai = true;
                    break;
                }
            }

            if (daTonTai || !emailNhanVe) {
                return;
            }

            let theLoai = "Chưa cập nhật";
            if (typeof khoPhim !== 'undefined' && khoPhim.length > 0) {
                const phim = khoPhim.find(p => p.ten === donHang.tenPhim);
                if (phim && phim.theLoai) {
                    theLoai = phim.theLoai;
                }
            }

            if (!emailNhanVe) {
                console.log("Không lưu vé vì thiếu email.");
                return;
            }

            let veDaLuuTruocDo = dsVeTaiKhoan.find(function (ve) {
                return ve.id === donHang.maVe;
            });

            if (veDaLuuTruocDo) {
                return;
            }

            /*
                Đây là format cũ mà vecuatoi.html đọc được.
                Không đổi tên key.
            */
            let theVeMoi = {
                id: donHang.maVe,
                email: emailNhanVe,
                movie: donHang.tenPhim || "",
                genre: theLoai,
                date: donHang.ngayChieu || "",
                time: donHang.gioChieu || "",
                seats: donHang.gheDaChon || [],
                combo: taoChuCombo(donHang),
                total: Number(donHang.tongTienCuoiCung || donHang.tienVe || 0)
            };

            dsVeTaiKhoan.push(theVeMoi);
            localStorage.setItem("cinema_tickets", JSON.stringify(dsVeTaiKhoan));

            console.log("Đã lưu vé đúng format cũ:", theVeMoi);
        }

        function GuiEmail() {
            let nutGui = document.getElementById("nut-gui-mail");

            if (!qrVeUrl) {
                nutGui.innerHTML = "⏳ Đang tạo mã QR, vui lòng bấm lại sau 1 giây!";
                setTimeout(function () {
                    nutGui.innerHTML = "Gửi vé về Email";
                }, 1500);
                return;
            }

            if (!emailNhanVe) {
                nutGui.innerHTML = "❌ Không tìm thấy địa chỉ email!";
                return;
            }

            // 1. Thay đổi trạng thái nút sang chế độ chờ để ngăn người dùng click liên tục
            nutGui.innerHTML = "⏳ Đang tiến hành gửi email...";
            nutGui.style.pointerEvents = "none";
            nutGui.style.opacity = "0.8";

            // 2. Lấy lại dữ liệu đơn hàng hiện tại từ localStorage để đóng gói nội dung email
            let donHang = JSON.parse(localStorage.getItem("thongTinDonHang")) || {};
            let tongTien = donHang.tongTienCuoiCung || donHang.tienVe || 0;

            // 3. Chuẩn bị các tham số (biến dữ liệu) để truyền vào biểu mẫu email
            let thamSoEmail = {
                to_email: emailNhanVe,
                customer_name: donHang.tenKhachHang || "Khách hàng",
                ticket_id: donHang.maVe || "Chưa có mã",
                movie_name: donHang.tenPhim || "Chưa có dữ liệu",
                show_time: (donHang.gioChieu || "") + " - " + (donHang.ngayChieu || ""),
                seats: (donHang.gheDaChon && donHang.gheDaChon.length > 0) ? donHang.gheDaChon.join(", ") : "Chưa chọn",
                combos: taoChuCombo(donHang),
                total_price: tongTien.toLocaleString("vi-VN") + "đ",
                qr_image: qrVeUrl
            };

            // 4. Gọi API của EmailJS để ra lệnh cho Server gửi thư đi thật
            emailjs.send("service_4cq84ps", "template_uhuru09", thamSoEmail)
                .then(function (response) {
                    // Kịch bản A: Gửi thư thành công mỹ mãn
                    console.log("Thành công!", response.status, response.text);
                    nutGui.innerHTML = "✅ Đã gửi vé về email thành công!";
                    nutGui.classList.add("da-gui");
                    nutGui.style.background = "#93e9be";
                    nutGui.style.color = "#0a0a0a";
                }, function (error) {
                    // Kịch bản B: Gặp lỗi đường truyền hoặc sai cấu hình API
                    console.error("Thất bại...", error);
                    nutGui.innerHTML = "❌ Lỗi kết nối! Thử lại sau.";
                    nutGui.style.pointerEvents = "auto";
                    nutGui.style.opacity = "1";
                });
        }

        function veTrangChu() {
            localStorage.removeItem("thongTinDonHang");
            window.location.href = "Trangchu.html";
        }
    </script>

    <div id="manGameHungBap" class="man-game-hung-bap">
        <div class="game-header-bap">
            <h2>🍿 Hứng bắp may mắn</h2>
            <p>Di chuyển hộp bắp để hứng <strong>1 cục bắp duy nhất</strong>.</p>
        </div>

        <div id="khuBapRoi" class="khu-bap-roi"></div>

        <div id="hopBapTroChuot" class="hop-bap-tro-chuot">
            <img src="../hinhanh/hopbap.png" alt="Hộp bắp">
        </div>

        <div id="ketQuaHungBap" class="ket-qua-hung-bap">
            <h2 id="tieuDeKetQuaBap"></h2>
            <p id="noiDungKetQuaBap"></p>
            <button onclick="dongGameHungBap()">Quay về vé</button>
        </div>
    </div>


    /* MINIGAME HỨNG BẮP */
    <script>
        let demBapDaRoiXong = 0;
        let tongSoBapDangRoi = 50;
        let dangChoiBap = false;
        let daHungBap = false;
        let bapMayMan = -1;
        let vongKiemTraBap = null;

        function moGameHungBap(e) {
            e.preventDefault();

            if (daHungBap) return;

            const manGame = document.getElementById("manGameHungBap");
            const hopBap = document.getElementById("hopBapTroChuot");
            const ketQua = document.getElementById("ketQuaHungBap");

            manGame.style.display = "block";
            manGame.classList.remove("ket-thuc");

            hopBap.style.display = "block";
            ketQua.classList.remove("hien");

            dangChoiBap = true;
            daHungBap = false;

            tao50BapRoi();

            document.addEventListener("mousemove", diChuyenHopBap);
            batDauKiemTraBap();
        }

        function tao50BapRoi() {
            const khuBap = document.getElementById("khuBapRoi");
            khuBap.innerHTML = "";

            tongSoBapDangRoi = 50;
            demBapDaRoiXong = 0;
            bapMayMan = Math.floor(Math.random() * tongSoBapDangRoi);

            for (let i = 0; i < tongSoBapDangRoi; i++) {
                const bap = document.createElement("div");
                bap.className = "bap-roi";
                bap.dataset.index = i;

                const img = document.createElement("img");
                img.src = "../hinhanh/cucbap.png";
                img.alt = "Bắp rang bơ";

                const size = Math.random() * 18 + 26;

                bap.style.width = size + "px";
                bap.style.height = size + "px";
                bap.style.left = Math.floor(Math.random() * 96 + 2) + "vw";
                bap.style.animationDuration = Math.random() * 5 + 7 + "s";
                bap.style.animationDelay = Math.random() * 5 + "s";

                bap.appendChild(img);

                bap.addEventListener("animationend", function () {
                    if (daHungBap) return;

                    demBapDaRoiXong++;

                    if (demBapDaRoiXong >= tongSoBapDangRoi) {
                        xuLyKhongHungBapNao();
                    }
                });

                khuBap.appendChild(bap);
            }
        }

        function diChuyenHopBap(e) {
            const hopBap = document.getElementById("hopBapTroChuot");

            hopBap.style.left = e.clientX + "px";
            hopBap.style.top = e.clientY + "px";
        }

        function batDauKiemTraBap() {
            clearInterval(vongKiemTraBap);

            vongKiemTraBap = setInterval(function () {
                if (!dangChoiBap || daHungBap) {
                    clearInterval(vongKiemTraBap);
                    return;
                }

                const hopBap = document.getElementById("hopBapTroChuot");
                const hopRect = hopBap.getBoundingClientRect();
                const dsBap = document.querySelectorAll(".bap-roi");

                dsBap.forEach(function (bap) {
                    const bapRect = bap.getBoundingClientRect();

                    const chamNhau =
                        hopRect.left < bapRect.right &&
                        hopRect.right > bapRect.left &&
                        hopRect.top < bapRect.bottom &&
                        hopRect.bottom > bapRect.top;

                    if (chamNhau) {
                        xuLyHungBap(Number(bap.dataset.index));
                    }
                });
            }, 60);
        }

        function xuLyHungBap(indexBap) {
            if (daHungBap) return;

            daHungBap = true;
            dangChoiBap = false;

            clearInterval(vongKiemTraBap);
            document.removeEventListener("mousemove", diChuyenHopBap);

            document.getElementById("hopBapTroChuot").style.display = "none";
            document.getElementById("manGameHungBap").classList.add("ket-thuc");

            const dsBap = document.querySelectorAll(".bap-roi");
            dsBap.forEach(function (bap) {
                bap.style.animationPlayState = "paused";
                bap.style.opacity = "0.2";
            });

            if (CHE_DO_TEST_TRUNG_THUONG || indexBap === bapMayMan) {
                const qua = randomQuaTangBap();

                hienKetQuaBap(
                    "Chúc mừng!",
                    `
                    Bạn đã hứng đúng cục bắp may mắn.<br>
                    Phần quà của bạn là: <strong>${qua.ten}</strong> khi đến rạp xem phim.
                    <img src="${qua.anh}" alt="${qua.ten}" class="anh-qua-trung">
                    `
                );

                guiEmailTrungThuong(qua);

            } else {
                hienKetQuaBap(
                    "🍿 Chúc bạn may mắn lần sau!",
                    "Cục bắp bạn hứng chưa phải là cục bắp may mắn. Cảm ơn bạn đã đặt vé tại Plant Cinema!"
                );
            }

            const linkHungBap = document.getElementById("linkHungBap");

            if (linkHungBap) {
                linkHungBap.style.pointerEvents = "none";
                linkHungBap.style.opacity = "0.5";
                linkHungBap.innerText = "🍿 Bạn đã hứng bắp rồi";
            }
        }

        function randomQuaTangBap() {
            const dsQua = [
                {
                    ten: "1 chiếc cốc Plant Cinema",
                    anh: "https://i.postimg.cc/T3c2LBss/coctrungthuong.png"
                },
                {
                    ten: "1 chú gấu bông Plant Cinema",
                    anh: "https://i.postimg.cc/mgSZzKqf/gautrungthuong.png"
                }
            ];

            return dsQua[Math.floor(Math.random() * dsQua.length)];
        }

        function hienKetQuaBap(tieuDe, noiDung) {
            const ketQua = document.getElementById("ketQuaHungBap");
            const tieuDeBox = document.getElementById("tieuDeKetQuaBap");
            const noiDungBox = document.getElementById("noiDungKetQuaBap");

            tieuDeBox.innerHTML = tieuDe;
            noiDungBox.innerHTML = noiDung;

            ketQua.classList.add("hien");
        }

        function guiEmailTrungThuong(qua) {
            let donHang = JSON.parse(localStorage.getItem("thongTinDonHang")) || {};

            if (!emailNhanVe) {
                console.log("Không gửi email quà vì thiếu email.");
                return;
            }

            let thamSoQua = {
                to_email: emailNhanVe,
                customer_name: donHang.tenKhachHang || "Khách hàng",
                ticket_id: donHang.maVe || "Chưa có mã vé",
                movie_name: donHang.tenPhim || "Chưa có dữ liệu",
                gift_name: qua.ten,
                gift_image: qua.anh
            };

            emailjs.send("service_4cq84ps", "template_i5p0qgq", thamSoQua)
                .then(function (response) {
                    console.log("Đã gửi email trúng thưởng:", response.status, response.text);
                })
                .catch(function (error) {
                    console.error("Lỗi gửi email trúng thưởng:", error);
                });
        }

        function dongGameHungBap() {
            const manGame = document.getElementById("manGameHungBap");

            manGame.style.display = "none";
            manGame.classList.remove("ket-thuc");
        }

        function xuLyKhongHungBapNao() {
            if (daHungBap) return;

            daHungBap = true;
            dangChoiBap = false;

            clearInterval(vongKiemTraBap);
            document.removeEventListener("mousemove", diChuyenHopBap);

            document.getElementById("hopBapTroChuot").style.display = "none";
            document.getElementById("manGameHungBap").classList.add("ket-thuc");

            hienKetQuaBap(
                "🍿 Chúc bạn may mắn lần sau!",
                "Bạn chưa hứng được cục bắp nào. Cảm ơn bạn đã đặt vé tại Plant Cinema!"
            );

            const linkHungBap = document.getElementById("linkHungBap");

            if (linkHungBap) {
                linkHungBap.style.pointerEvents = "none";
                linkHungBap.style.opacity = "0.5";
                linkHungBap.innerText = "🍿 Bạn đã chơi hứng bắp rồi";
            }
        }
    </script>
</body>
