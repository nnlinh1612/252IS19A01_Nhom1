<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../hinhanh/logo.png">
    <title>Vé Thành Công - PLANT CINEMA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/datve.css">
</head>

<body>
    <main class="trang-xac-nhan">
        <section class="khoi-giao-dien hop-ve-thanh-cong">
            <h2 class="tieu-de-thanh-cong">ĐẶT VÉ THÀNH CÔNG!</h2>

            <div class="khung-thong-tin-ve">
                <p class="ma-ve">
                    Mã vé:
                    <strong id="kq-ma"></strong>
                </p>

                <p class="dong-thong-tin">
                    Khách hàng:
                    <strong id="kq-ten"></strong>
                </p>

                <p class="dong-thong-tin">
                    Phim:
                    <strong id="kq-phim"></strong>
                </p>

                <p class="dong-thong-tin">
                    Thời gian:
                    <strong id="kq-thoigian"></strong>
                </p>

                <p class="dong-thong-tin">
                    Ghế:
                    <strong id="kq-ghe"></strong>
                    <span id="kq-loaive"></span>
                </p>

                <p class="dong-thong-tin">
                    Combo:
                    <strong id="kq-combo"></strong>
                </p>

                <hr>

                <h3 class="tong-da-thanh-toan">
                    Đã thanh toán:
                    <span id="kq-tong"></span>
                </h3>
            </div>

            <div class="khu-vuc-nut">
                <button id="nut-gui-mail" class="nut-gui-mail" onclick="giaLapGuiEmail()">Gửi vé về Email</button>
                <button class="nut-thanh-toan" onclick="veTrangChu()">
                    Về Trang Chủ
                </button>
            </div>
        </section>
    </main>

    <script>
        let emailNhanVe = "";

        document.addEventListener("DOMContentLoaded", function () {
            let donHang = JSON.parse(localStorage.getItem("thongTinDonHang"));

            if (!donHang) {
                window.location.href = "Trangchu.html";
                return;
            }

            /*
                Lấy thông tin user đang đăng nhập.
                Đặt tên là userDangDangNhap để KHÔNG đụng currentUser của taikhoan.js.
            */
            let userDangDangNhap = JSON.parse(sessionStorage.getItem("currentUser"));

            if (userDangDangNhap) {
                if (!donHang.tenKhachHang) {
                    donHang.tenKhachHang = userDangDangNhap.name || "";
                }

                if (!donHang.emailKhachHang) {
                    donHang.emailKhachHang = userDangDangNhap.email || "";
                }

                if (!donHang.sdtKhachHang) {
                    donHang.sdtKhachHang = userDangDangNhap.phone || "";
                }
            }

            /*
                Nếu trang thanh toán chưa tạo mã vé thì tạo ở đây.
            */
            if (!donHang.maVe) {
                donHang.maVe = "PL-" + Math.floor(Math.random() * 100000);
            }

            /*
                Đảm bảo tổng tiền luôn có số.
            */
            if (!donHang.tongTienCuoiCung) {
                donHang.tongTienCuoiCung = donHang.tienVe || 0;
            }

            /*
                Đảm bảo gheDaChon luôn là mảng string,
                vì vecuatoi.html đang dùng t.seats.join(', ')
            */
            if (!Array.isArray(donHang.gheDaChon)) {
                donHang.gheDaChon = [];
            }

            localStorage.setItem("thongTinDonHang", JSON.stringify(donHang));

            hienThiThongTinVe(donHang);
            luuVeVaoLichSuTaiKhoan(donHang);
        });

        function hienThiThongTinVe(donHang) {
            document.getElementById("kq-ma").innerText = donHang.maVe || "";
            document.getElementById("kq-ten").innerText = donHang.tenKhachHang || "";
            document.getElementById("kq-phim").innerText = donHang.tenPhim || "";

            document.getElementById("kq-thoigian").innerText =
                (donHang.gioChieu || "") + " - " + (donHang.ngayChieu || "");

            if (donHang.gheDaChon && donHang.gheDaChon.length > 0) {
                document.getElementById("kq-ghe").innerText = donHang.gheDaChon.join(", ");
            } else {
                document.getElementById("kq-ghe").innerText = "Chưa có";
            }

            if (donHang.loaiVe) {
                document.getElementById("kq-loaive").innerText = "(" + donHang.loaiVe + ")";
            } else {
                document.getElementById("kq-loaive").innerText = "";
            }

            document.getElementById("kq-combo").innerText = taoChuCombo(donHang);

            document.getElementById("kq-tong").innerText =
                Number(donHang.tongTienCuoiCung || 0).toLocaleString("vi-VN") + "đ";

            emailNhanVe = donHang.emailKhachHang || "";
        }

        function taoChuCombo(donHang) {
            let chuCombo = "";

            if (donHang.soLuongCombo1 > 0) {
                chuCombo += donHang.soLuongCombo1 + "x Combo 1 ";
            }

            if (donHang.soLuongCombo2 > 0) {
                chuCombo += donHang.soLuongCombo2 + "x Combo 2";
            }

            if (chuCombo === "") {
                return "Không";
            }

            return chuCombo;
        }

        function luuVeVaoLichSuTaiKhoan(donHang) {
            let dsVeTaiKhoan = JSON.parse(localStorage.getItem("cinema_tickets")) || [];

            if (!emailNhanVe) {
                console.log("Không lưu vé vì thiếu email.");
                return;
            }

            let veDaLuuTruocDo = dsVeTaiKhoan.find(function (ve) {
                return ve.id === donHang.maVe;
            });

            if (veDaLuuTruocDo) {
                return;
            }

            /*
                Đây là format cũ mà vecuatoi.html đọc được.
                Không đổi tên key.
            */
            let theVeMoi = {
                id: donHang.maVe,
                email: emailNhanVe,
                movie: donHang.tenPhim || "",
                date: donHang.ngayChieu || "",
                time: donHang.gioChieu || "",
                seats: donHang.gheDaChon || [],
                combo: taoChuCombo(donHang),
                total: Number(donHang.tongTienCuoiCung || donHang.tienVe || 0)
            };

            dsVeTaiKhoan.push(theVeMoi);
            localStorage.setItem("cinema_tickets", JSON.stringify(dsVeTaiKhoan));

            console.log("Đã lưu vé đúng format cũ:", theVeMoi);
        }

        function giaLapGuiEmail() {
            let nutGui = document.getElementById("nut-gui-mail");

            if (!emailNhanVe) {
                nutGui.innerHTML = "Không tìm thấy email";
                return;
            }

            nutGui.innerHTML = "Đang gửi đến " + emailNhanVe + "...";
            nutGui.style.pointerEvents = "none";
            nutGui.style.opacity = "0.85";

            setTimeout(function () {
                nutGui.innerHTML = "Đã gửi vé thành công!";
                nutGui.classList.add("da-gui");
            }, 2000);
        }

        function veTrangChu() {
            localStorage.removeItem("thongTinDonHang");
            window.location.href = "Trangchu.html";
        }
    </script>
</body>

</html>
