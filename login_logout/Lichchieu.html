<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Chiếu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="taikhoan.css">
</head>
<body>
<header class="dau-trang-kinh navbar navbar-expand-lg navbar-dark">
<div class="container-fluid p-0 d-flex justify-content-between align-items-center flex-wrap flex-lg-nowrap">
    
    <div class="logo">PLANT CINEMA</div>
    
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#thanhDieuHuongResponsive">
        <span class="navbar-toggler-icon"></span>
    </button>
    
    <nav class="thanh-dieu-huong collapse navbar-collapse justify-content-lg-center" id="thanhDieuHuongResponsive">
        <ul>
            <li><a href="Trangchu.html">Trang chủ</a></li>
            <li><a href="Lichchieu.html" class="dang-chon">Lịch chiếu</a></li>
            <li><a href="#">Tin tức</a></li>
            <li><a href="#">Khuyến mãi</a></li>
            <li><a href="#">Giá vé</a></li>
        </ul>
    </nav>
    
    <div class="tai-khoan collapse navbar-collapse justify-content-lg-end" id="thanhDieuHuongResponsiveAccount">
        <div class="nhom-nut-tk d-flex  mt-3 mt-lg-0" id="taikhoanArea">
            <button class="nut-dang-nhap" onclick="moModal('dangNhapModal')">Đăng nhập</button>
            <button class="nut-dang-ky" onclick="moModal('dangKyModal')">Đăng ký</button>
        </div>
    </div>

</div>
</header>

    <main class="container my-4 my-md-5">
        
        <div id="vung-lich-chieu">
            <h2 class="tieu-de-muc text-center mb-4">Phim Đang Chiếu</h2>
            <div class="row justify-content-center mb-4">
                <div class="col-12 col-md-8 col-lg-6">
            
                <div style="position: relative; width: 100%;">
                
                    <i class="fas fa-search icon-tim-kiem"></i>
                
                    <input type="text" id="o-tim-kiem-phim" class="form-control o-tim-kiem-phim w-100" 
                       placeholder="Nhập tên phim bạn muốn tìm..." 
                       oninput="renderDanhSachLichChieu()">
                       
                </div>

            </div>
        </div>
            <div class="thanh-chon-ngay d-flex justify-content-start justify-content-md-center gap-2 mb-4 mb-md-5" id="thanh-chon-ngay">
                
            </div>

            <div class="row g-3 g-md-4" id="danh-sach-phim">
                </div>
        </div>

        <div id="vung-chi-tiet" class="d-none">
            </div>

    </main>
    <!-- MODAL ĐĂNG NHẬP -->
    <div id="dangNhapModal" class="taikhoan-modal">
        <div class="taikhoan-modal-content">
            <span class="taikhoan-close" onclick="dongModal('dangNhapModal')">&times;</span>
            <h2>ĐĂNG NHẬP</h2>
            <input type="email" id="loginEmail" class="taikhoan-input" placeholder="Email">
            <input type="password" id="loginPass" class="taikhoan-input" placeholder="Mật khẩu">
            <div id="loginError" class="taikhoan-error"></div>
            <button class="taikhoan-btn-submit" onclick="dangNhap()">Đăng nhập</button>
            <div style="text-align: center; margin-top: 15px;">
                <span style="color:#888;">Chưa có tài khoản? </span>
                <span onclick="moModal('dangKyModal'); dongModal('dangNhapModal');" style="color:#93e9be; cursor:pointer;">Đăng ký ngay</span>
            </div>
        </div>
    </div>

    <!-- MODAL ĐĂNG KÝ -->
    <div id="dangKyModal" class="taikhoan-modal">
        <div class="taikhoan-modal-content">
            <span class="taikhoan-close" onclick="dongModal('dangKyModal')">&times;</span>
            <h2>ĐĂNG KÝ</h2>
            <input type="text" id="regName" class="taikhoan-input" placeholder="Họ tên">
            <input type="tel" id="regPhone" class="taikhoan-input" placeholder="Số điện thoại">
            <input type="email" id="regEmail" class="taikhoan-input" placeholder="Email">
            <input type="password" id="regPass" class="taikhoan-input" placeholder="Mật khẩu">
            <div id="regError" class="taikhoan-error"></div>
            <div id="regSuccess" class="taikhoan-success"></div>
            <button class="taikhoan-btn-submit" onclick="dangKy()">Tạo tài khoản</button>
            <div style="text-align: center; margin-top: 15px;">
                <span style="color:#888;">Đã có tài khoản? </span>
                <span onclick="moModal('dangNhapModal'); dongModal('dangKyModal');" style="color:#93e9be; cursor:pointer;">Đăng nhập</span>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="taikhoan.js"></script>
    <script src="script.js"></script>
</body>
</html>
